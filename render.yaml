services:
  - type: web
    name: ress-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ress-db
          property: connectionString
      - key: APP_NAME
        value: RESS API
      - key: DEBUG
        value: "false"
      - key: API_KEY
        generateValue: true

databases:
  - name: ress-db
    plan: basic-256mb
